<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brian | 半導體 & AI 工程師</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Light Blue Gradient: 淺藍漸層 ===== */
    :root {
      --bg-white: #ffffff;
      --bg-warm: #e8f2fb;
      --bg-gradient-start: #e8f2fb;
      --bg-gradient-mid: #eef5fc;
      --bg-gradient-end: #f4f8fd;
      --text-primary: rgba(0,0,0,0.95);
      --text-secondary: #4a5568;
      --text-tertiary: #718096;
      --accent: #0075de;
      --accent-hover: #005bab;
      --badge-bg: #e8f4fd;
      --badge-text: #0068d6;
      --border: rgba(0,0,0,0.08);
      --card-bg: rgba(255,255,255,0.75);
      --card-bg-hover: rgba(255,255,255,0.92);
      --shadow-card: rgba(0,0,0,0.04) 0px 4px 18px, rgba(0,0,0,0.02) 0px 2px 7px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
      background-attachment: fixed;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Navigation */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(232,242,251,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    nav .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .logo { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    nav .nav-links { display: flex; gap: 24px; list-style: none; align-items: center; }
    nav .nav-links a {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav .nav-links a:hover { color: var(--accent); }
    .nav-cta {
      background: var(--accent);
      color: #fff !important;
      padding: 7px 15px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
    }
    .nav-cta:hover { background: var(--accent-hover); color: #fff !important; }

    /* Hero */
    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 24px 80px;
      text-align: center;
    }
    .hero h1 {
      font-size: 64px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.00;
      letter-spacing: -0.033em;
      margin-bottom: 20px;
    }
    .hero .subtitle {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-secondary);
      line-height: 1.4;
      letter-spacing: -0.006em;
      margin-bottom: 36px;
    }
    .hero .cta-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: 4px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary {
      background: rgba(0,0,0,0.05);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 4px;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: rgba(0,0,0,0.08); }

    /* Sections */
    section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 72px 24px;
    }
    section.warm { background: var(--bg-warm); max-width: 100%; }
    section.warm .inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    section h2 {
      font-size: 48px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.00;
      letter-spacing: -0.031em;
      text-align: center;
      margin-bottom: 12px;
    }
    section .section-desc {
      text-align: center;
      color: var(--text-secondary);
      font-size: 16px;
      margin-bottom: 48px;
    }

    /* About */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
    .about-text { font-size: 16px; line-height: 1.6; color: var(--text-secondary); }
    .about-text p { margin-bottom: 14px; }
    .info-cards { display: flex; flex-direction: column; gap: 8px; }
    .info-card {
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 14px;
      color: var(--text-secondary);
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .info-card strong { color: var(--text-primary); font-weight: 600; }

    /* Timeline */
    .timeline { border-left: 1px solid var(--border); padding-left: 28px; margin-left: 12px; }
    .timeline-item { margin-bottom: 28px; position: relative; }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -34px;
      top: 5px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }
    .timeline-item .date {
      font-size: 12px;
      font-weight: 600;
      color: var(--badge-text);
      text-transform: uppercase;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
      display: inline-block;
      background: var(--badge-bg);
      padding: 2px 8px;
      border-radius: 9999px;
    }
    .timeline-item h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .timeline-item .org { font-size: 15px; color: var(--text-secondary); margin-bottom: 4px; }
    .timeline-item p { font-size: 14px; color: var(--text-tertiary); }

    /* Skills */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .skill-card {
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-card);
    }
    .skill-card h3 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 12px;
      font-weight: 600;
      color: var(--badge-text);
      background: var(--badge-bg);
      padding: 4px 10px;
      border-radius: 9999px;
      letter-spacing: 0.01em;
    }

    /* Research */
    .research-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .research-card {
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      box-shadow: var(--shadow-card);
      transition: transform 0.2s;
    }
    .research-card:hover { transform: translateY(-2px); }
    .research-card h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
    .research-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .project-card {
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      transition: transform 0.2s;
    }
    .project-card:hover { transform: translateY(-2px); }
    .project-card .card-img {
      height: 160px;
      background: linear-gradient(135deg, #dce9f7, #e8f2fb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
    }
    .project-card .card-body { padding: 20px; }
    .project-card h3 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .project-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

    /* Contact */
    .contact-section { text-align: center; }
    .contact-links { display: flex; justify-content: center; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .contact-link:hover { background: rgba(0,117,222,0.06); }

    footer {
      background: rgba(200, 220, 240, 0.5);
      backdrop-filter: blur(4px);
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: var(--text-tertiary);
    }

    @media (max-width: 640px) {
      .hero h1 { font-size: 40px; }
      section h2 { font-size: 32px; }
      .about-grid { grid-template-columns: 1fr; }
      nav .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav id="main-nav"></nav>
<header class="hero" id="hero-section"></header>

<section class="warm" id="research"><div class="inner"></div></section>
<section id="projects"></section>
<section class="warm" id="contact"><div class="inner contact-section"></div></section>
<footer></footer>
